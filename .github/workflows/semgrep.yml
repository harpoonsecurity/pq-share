name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Run Semgrep
        # Using `semgrep scan --error` instead of `semgrep ci` because
        # `semgrep ci` without a SEMGREP_APP_TOKEN ignores inline
        # `# nosemgrep` suppression comments. `scan --error` keeps the
        # "exit 1 on findings" CI signal but honors the comments, so
        # documented FPs in db.py don't fail the workflow.
        run: |
          semgrep scan --config=auto --error \
            --json-output=semgrep-results.json \
            --sarif-output=semgrep-results.sarif

      - name: Upload Semgrep JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-json
          path: semgrep-results.json
          retention-days: 90
          if-no-files-found: error

      - name: Upload Semgrep SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-sarif
          path: semgrep-results.sarif
          retention-days: 90
          if-no-files-found: error
