name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep ci --config=auto
