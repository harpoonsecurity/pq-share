name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Run Semgrep
        # `semgrep ci` without a SEMGREP_APP_TOKEN ignores inline
        # `# nosemgrep` comments, so we use `semgrep scan` and exclude
        # the one rule that fires entirely on hardcoded migration DDL
        # in backend/app/db.py (see in-file comments for the rationale).
        # `--error` keeps the "exit non-zero on findings" CI signal for
        # any other rule that fires.
        run: |
          semgrep scan --config=auto --error \
            --exclude-rule=python.sqlalchemy.security.audit.avoid-sqlalchemy-text.avoid-sqlalchemy-text \
            --json-output=semgrep-results.json \
            --sarif-output=semgrep-results.sarif

      - name: Upload Semgrep JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-json
          path: semgrep-results.json
          retention-days: 90
          if-no-files-found: error

      - name: Upload Semgrep SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results-sarif
          path: semgrep-results.sarif
          retention-days: 90
          if-no-files-found: error
