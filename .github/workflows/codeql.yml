name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # actions: read is needed by codeql-action for status/telemetry API
  # calls even when upload:never (without it, analyze step fails with
  # "Resource not accessible by integration").
  actions: read
  # security-events: write would be needed for SARIF upload to the
  # GitHub Security tab. That requires GitHub Advanced Security on
  # private repos — we don't have it. Using upload:never below and
  # shipping SARIF as a workflow artifact instead.

jobs:
  analyze:
    name: CodeQL ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
          - language: javascript-typescript

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          build-mode: none

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: never
          output: sarif-out

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: sarif-out
          retention-days: 90
          if-no-files-found: error
